model:
  name: yolo26m-seg-pipevision-fp16
  format: onnx
  input_shape: [1, 3, 640, 640]
  precision: fp16
  opset: 17
  outputs:
    - name: output0
      role: detections (per-box: x,y,w,h,conf,class_id,mask_0..mask_31)
      shape: [1, 300, 38]
    - name: output1
      role: prototypes (32 mask channels at 160x160)
      shape: [1, 32, 160, 160]
  sha256: "31d957904714fac576b112386b6e1bee4daa53f44b61afc88be18ce8e8d68ca7"
mask:
  channels: 32
  resolution: 160
inference:
  conf_threshold: 0.25
  iou_threshold: 0.45
  max_detections: 100
metrics:
  test:
    mAP_box_0_5: 0.5182
    mAP_box_0_5_0_95: 0.2923
    mAP_mask_0_5: 0.4995
    mAP_mask_0_5_0_95: 0.2800
